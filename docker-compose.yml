services:
  api-service:
    build:
      context: .
      dockerfile: services/api-service/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - VALKEY_ENDPOINT=valkey
      - VALKEY_PORT=6379
      - AGENT_SERVICE_URL=http://agent-service:8081
      - ENVIRONMENT=local
      - AWS_REGION=us-east-1
    depends_on:
      - valkey
      - agent-service

  agent-service:
    build:
      context: .
      dockerfile: services/agent-service/Dockerfile
    ports:
      - "8081:8081"
    environment:
      - VALKEY_ENDPOINT=valkey
      - VALKEY_PORT=6379
      - ENVIRONMENT=local
      - AWS_REGION=us-east-1
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_ACCESS_KEY_ID= //
      - AWS_SECRET_ACCESS_KEY= //
      - AWS_SESSION_TOKEN= //
      - PROMPTS_DIR=/app/shared/prompts
    depends_on:
      - valkey

  valkey:
    image: valkey/valkey:7.2-alpine
    ports:
      - "6379:6379"
    command: valkey-server --save 60 1
